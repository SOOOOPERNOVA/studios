<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>ONT Studios — Coming Soon</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #ffffff;
            color: #1a1a1a;
            font-family: 'Pretendard', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        
        .container {
            max-width: 500px;
        }
        
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
        }
        
        p {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #666;
        }
        
        a {
            color: #1a1a1a;
            text-decoration: none;
            border-bottom: 1px solid #ccc;
            padding-bottom: 2px;
            transition: border-color 0.3s ease;
        }
        
        a:hover {
            border-bottom-color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ONT STUDIOS</h1>
        <p>
            Coming Soon.<br>
            포트폴리오 페이지를 준비하고 있습니다.
        </p>
        <p style="margin-top: 2rem;">
            <a href="https://ont.co.kr">← ont.co.kr</a>
        </p>
    </div>
</body>
</html>
